name: Release Type-A

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --include=optional
      - name: Verify tag and package version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          test "${GITHUB_REF_NAME}" = "v${VERSION}"
      - run: npm run lint
      - run: npm run build

  windows:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --include=optional
      - run: npm run build
      - run: npx electron-builder --win nsis --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error

  linux:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --include=optional
      - run: npm run build
      - run: npx electron-builder --linux AppImage deb --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest-linux.yml
          if-no-files-found: error

  macos:
    needs: validate
    runs-on: macos-14
    env:
      CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Configure signing mode
        shell: bash
        run: |
          if [[ -n "$CSC_LINK" && -n "$CSC_KEY_PASSWORD" && -n "$APPLE_API_KEY_ID" && -n "$APPLE_API_ISSUER" && -n "$APPLE_API_KEY_BASE64" ]]; then
            echo "SIGNED_BUILD=true" >> "$GITHUB_ENV"
            KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
            echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
            echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"
          else
            echo "SIGNED_BUILD=false" >> "$GITHUB_ENV"
          fi
      - name: Install x64 dependencies
        run: npm ci --include=optional --cpu=x64 --os=darwin
      - run: npm run build
      - name: Build macOS x64
        shell: bash
        run: |
          if [[ "$SIGNED_BUILD" == "true" ]]; then
            npx electron-builder --mac dmg zip --x64 --publish never
          else
            npx electron-builder --mac dmg zip --x64 --publish never --config.mac.identity=null --config.mac.hardenedRuntime=false --config.extraMetadata.typeAAutoUpdateEnabled=false
          fi
          mv release release-macos-x64
      - name: Install arm64 dependencies
        shell: bash
        run: |
          rm -rf node_modules
          npm ci --include=optional --cpu=arm64 --os=darwin
      - run: npm run build
      - name: Build macOS arm64
        shell: bash
        run: |
          if [[ "$SIGNED_BUILD" == "true" ]]; then
            npx electron-builder --mac dmg zip --arm64 --publish never
          else
            npx electron-builder --mac dmg zip --arm64 --publish never --config.mac.identity=null --config.mac.hardenedRuntime=false --config.extraMetadata.typeAAutoUpdateEnabled=false
          fi
          mv release release-macos-arm64
      - name: Merge macOS artifacts and updater metadata
        shell: bash
        run: |
          mkdir release
          cp release-macos-x64/*.dmg release-macos-x64/*.zip release-macos-x64/*.blockmap release/
          cp release-macos-arm64/*.dmg release-macos-arm64/*.zip release-macos-arm64/*.blockmap release/
          node scripts/merge-mac-update-metadata.mjs release-macos-x64/latest-mac.yml release-macos-arm64/latest-mac.yml release/latest-mac.yml
      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: release/*
          if-no-files-found: error

  publish:
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release
          merge-multiple: true
      - name: Verify release payload
        shell: bash
        run: |
          test -n "$(find release -maxdepth 1 -name '*.exe' -print -quit)"
          test -n "$(find release -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$(find release -maxdepth 1 -name '*.zip' -print -quit)"
          test -n "$(find release -maxdepth 1 -name '*.AppImage' -print -quit)"
          test -n "$(find release -maxdepth 1 -name '*.deb' -print -quit)"
          test -f release/latest.yml
          test -f release/latest-mac.yml
          test -f release/latest-linux.yml
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/* --verify-tag --generate-notes --title "Type-A $GITHUB_REF_NAME"
